<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>P2TL Pasca</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#00B8C4;--teal-dark:#0099A8;--teal-light:#E0F7FA;
  --bg:#F0F4F8;--card:#fff;--border:#E2EBF0;
  --text:#1A2E3B;--sub:#6B8FA8;
  --green:#22C55E;--amber:#F59E0B;--red:#EF4444;--blue:#3B82F6;
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ── SETUP ── */
#setup{position:fixed;inset:0;background:var(--teal-dark);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.setup-wrap{width:100%;max-width:420px}
.setup-hero{text-align:center;margin-bottom:24px}
.setup-hero .icon{width:72px;height:72px;background:rgba(255,255,255,.2);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 12px;backdrop-filter:blur(8px)}
.setup-hero h1{font-size:1.5rem;font-weight:800;color:#fff;margin-bottom:4px}
.setup-hero p{font-size:.88rem;color:rgba(255,255,255,.75)}
.setup-card{background:#fff;border-radius:20px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.78rem;font-weight:700;color:var(--sub);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.form-group input{width:100%;border:2px solid var(--border);border-radius:12px;padding:11px 14px;color:var(--text);font-size:.9rem;outline:none;transition:border-color .2s;font-family:'Nunito',sans-serif}
.form-group input:focus{border-color:var(--teal)}
.hint{font-size:.75rem;color:var(--sub);margin-top:5px}
.btn-teal{width:100%;background:var(--teal);color:#fff;border:none;border-radius:12px;padding:13px;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:4px;font-family:'Nunito',sans-serif;transition:background .2s;letter-spacing:.02em}
.btn-teal:hover{background:var(--teal-dark)}

/* ── HEADER ── */
#header{background:linear-gradient(135deg,var(--teal-dark) 0%,var(--teal) 100%);padding:14px 16px 10px;flex-shrink:0;display:none}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.header-logo{width:36px;height:36px;background:rgba(255,255,255,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.header-title{font-size:1rem;font-weight:800;color:#fff;flex:1}
.header-user{font-size:.78rem;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:5px}
.sync-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 12px;border-radius:20px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:background .2s}
.sync-btn:hover{background:rgba(255,255,255,.35)}
.stats-row{display:flex;gap:8px}
.stat-chip{flex:1;background:rgba(255,255,255,.15);border-radius:10px;padding:7px 6px;text-align:center;backdrop-filter:blur(4px)}
.stat-chip .cnt{font-size:1.1rem;font-weight:800;color:#fff;display:block}
.stat-chip .lbl{font-size:.65rem;color:rgba(255,255,255,.8);text-transform:uppercase;letter-spacing:.04em}

/* ── MAIN ── */
#main{display:none;flex:1;overflow:hidden}
@media(min-width:700px){
  #main{flex-direction:row}
  #list-panel{width:300px;flex-shrink:0;display:flex!important;flex-direction:column;border-right:1px solid var(--border)}
  #map{flex:1}
  #bottom-nav{display:none!important}
}
@media(max-width:699px){
  #main{flex-direction:column}
  .pane{display:none!important}
  .pane.active{display:flex!important;flex-direction:column;flex:1;min-height:0}
  #map.active{display:block!important}
  #map{padding-bottom:60px}
}

/* ── LIST PANEL ── */
#list-panel{background:var(--bg)}
#list-controls{padding:10px 12px;background:#fff;border-bottom:1px solid var(--border)}
.search-wrap{position:relative}
.search-wrap input{width:100%;background:var(--bg);border:2px solid var(--border);border-radius:24px;padding:9px 14px 9px 38px;color:var(--text);font-size:.85rem;outline:none;font-family:'Nunito',sans-serif;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--teal)}
.search-wrap .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--sub);font-size:.9rem;pointer-events:none}
#list-body{flex:1;overflow-y:auto;padding:10px 10px 16px}

/* ── CUSTOMER CARD ── */
.cust-card{background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:8px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.06);border:2px solid transparent;transition:all .2s}
.cust-card:hover,.cust-card.active{border-color:var(--teal);box-shadow:0 4px 16px rgba(0,184,196,.2)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.card-nama{font-size:.9rem;font-weight:700;color:var(--text);line-height:1.2;flex:1;margin-right:8px}
.skor-pill{font-size:.7rem;font-weight:800;padding:3px 9px;border-radius:20px;flex-shrink:0}
.skor-low{background:#DBEAFE;color:#1D4ED8}
.skor-mid{background:#FEF3C7;color:#B45309}
.skor-high{background:#FEE2E2;color:#B91C1C}
.card-meta{font-size:.75rem;color:var(--sub);margin-bottom:6px}
.card-status{display:flex;align-items:center;gap:6px}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-lbl{font-size:.73rem;font-weight:700}
.no-coord-tag{font-size:.65rem;background:#F1F5F9;color:var(--sub);padding:2px 7px;border-radius:10px;margin-left:auto}

/* ── MAP ── */
#map{background:#e8f4f5}

/* ── BOTTOM NAV (mobile) ── */
#bottom-nav{display:flex;background:#fff;border-top:2px solid var(--border);flex-shrink:0;box-shadow:0 -2px 12px rgba(0,0,0,.1)}
.nav-btn{flex:1;padding:12px 0 10px;display:flex;flex-direction:column;align-items:center;gap:4px;border:none;background:none;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--sub);font-size:.75rem;font-weight:800;transition:all .2s;letter-spacing:.04em}
.nav-btn.active{color:var(--teal)}
.nav-btn.active{border-top:3px solid var(--teal);padding-top:9px}
.nav-btn .nav-ico{font-size:1.5rem}
.nav-btn.active .nav-ico{filter:drop-shadow(0 0 4px rgba(0,184,196,.5))}

/* ── MODAL ── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:2000;display:none;align-items:flex-end;justify-content:center;padding:0}
@media(min-width:700px){#modal-overlay{align-items:center;padding:20px}}
#modal-overlay.open{display:flex}
#modal{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto}
@media(min-width:700px){#modal{border-radius:20px;max-height:88vh}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0}
.modal-header{padding:14px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px}
.modal-icon{width:44px;height:44px;background:var(--teal-light);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.modal-title{flex:1}
.modal-title h2{font-size:1rem;font-weight:800;color:var(--text);line-height:1.2}
.modal-title .idpel{font-size:.75rem;color:var(--sub);margin-top:2px}
.modal-close{background:var(--bg);border:none;color:var(--sub);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.modal-body{padding:16px 20px 24px}

/* Info grid */
.info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.info-box{background:var(--bg);border-radius:12px;padding:10px 10px}
.info-box label{display:block;font-size:.68rem;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.info-box span{font-size:.88rem;font-weight:700;color:var(--text)}
.alasan-box{background:var(--teal-light);border-left:3px solid var(--teal);border-radius:0 10px 10px 0;padding:10px 12px;font-size:.82rem;color:var(--teal-dark);margin-bottom:14px;line-height:1.5;font-weight:600}

/* Chart */
.section-lbl{font-size:.75rem;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
#usage-chart{margin-bottom:14px}
.chart-bars{display:flex;align-items:flex-end;gap:4px;height:64px;margin-bottom:4px}
.chart-bar{background:linear-gradient(180deg,var(--teal) 0%,var(--teal-dark) 100%);border-radius:4px 4px 0 0;min-width:8px;flex:1;transition:opacity .2s}
.chart-bar:hover{opacity:.75}
.chart-xlabels{display:flex;gap:4px}
.chart-xl{flex:1;font-size:.58rem;color:var(--sub);text-align:center;overflow:hidden;line-height:1.1}

/* Status buttons */
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.s-btn{padding:11px 8px;border-radius:12px;border:2px solid var(--border);cursor:pointer;font-size:.82rem;font-weight:700;background:#fff;color:var(--sub);font-family:'Nunito',sans-serif;transition:all .15s;text-align:center}
.s-btn:hover{transform:translateY(-1px)}
.s-btn.act-belum{border-color:var(--blue);color:var(--blue);background:#EFF6FF}
.s-btn.act-proses{border-color:var(--amber);color:#B45309;background:#FFFBEB}
.s-btn.act-bersih{border-color:var(--green);color:#15803D;background:#F0FDF4}
.s-btn.act-temuan{border-color:var(--red);color:#B91C1C;background:#FFF1F1}
.s-btn[data-s="belum"]:hover{border-color:var(--blue);color:var(--blue);background:#EFF6FF}
.s-btn[data-s="proses"]:hover{border-color:var(--amber);color:#B45309;background:#FFFBEB}
.s-btn[data-s="bersih"]:hover{border-color:var(--green);color:#15803D;background:#F0FDF4}
.s-btn[data-s="temuan"]:hover{border-color:var(--red);color:#B91C1C;background:#FFF1F1}

.catatan-wrap{margin-bottom:14px}
.catatan-wrap textarea{width:100%;border:2px solid var(--border);border-radius:12px;padding:10px 12px;font-size:.85rem;color:var(--text);resize:vertical;min-height:64px;outline:none;font-family:'Nunito',sans-serif;background:var(--bg);transition:border-color .2s}
.catatan-wrap textarea:focus{border-color:var(--teal)}
.photo-row{display:flex;gap:8px;margin-bottom:12px}
.photo-btn{flex:1;padding:9px;border-radius:10px;background:var(--bg);border:2px solid var(--border);color:var(--sub);cursor:pointer;font-size:.8rem;font-weight:700;text-decoration:none;text-align:center;font-family:'Nunito',sans-serif;transition:all .2s}
.photo-btn:hover{border-color:var(--teal);color:var(--teal)}
.photo-btn.disabled{opacity:.35;pointer-events:none}
.save-btn{width:100%;background:linear-gradient(135deg,var(--teal-dark),var(--teal));color:#fff;border:none;border-radius:12px;padding:13px;font-size:.95rem;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;letter-spacing:.02em}
.save-btn:disabled{background:#D1D5DB;cursor:not-allowed}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--teal-dark);color:#fff;padding:10px 20px;border-radius:24px;font-size:.85rem;font-weight:700;z-index:9999;opacity:0;transition:all .3s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red)}
@media(min-width:700px){.toast{bottom:24px}}

.gmaps-btn{background:#E8F5E9;border-color:#4CAF50;color:#2E7D32;font-weight:700}
.gmaps-btn:hover{border-color:#2E7D32;background:#C8E6C9}
.gmaps-btn.disabled{opacity:.35;pointer-events:none}
/* scrollbar */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="setup-wrap">
    <div class="setup-hero">
      <div class="icon">⚡</div>
      <h1>P2TL Pasca</h1>
      <p>Monitoring kunjungan penertiban pemakaian tenaga listrik</p>
    </div>
    <div class="setup-card">
      <div class="form-group">
        <label>Nama Petugas</label>
        <input id="inp-nama" placeholder="Masukkan nama kamu" />
      </div>
      <div class="form-group">
        <label>URL Apps Script <span style="font-weight:400;text-transform:none;font-size:.78rem">(opsional)</span></label>
        <input id="inp-url" placeholder="https://script.google.com/macros/s/..." />
        <div class="hint">Kosongkan jika belum ada / pakai offline saja</div>
      </div>
      <button class="btn-teal" onclick="startApp()">Mulai →</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<div id="header">
  <div class="header-top">
    <div class="header-logo">⚡</div>
    <div class="header-title">P2TL Pasca</div>
    <div class="header-user">👤 <span id="user-name"></span></div>
    <button class="sync-btn" onclick="syncStatus()">↻ Sync</button>
  </div>
  <div class="stats-row">
    <div class="stat-chip"><span class="cnt" id="cnt-belum">0</span><span class="lbl">Belum</span></div>
    <div class="stat-chip"><span class="cnt" id="cnt-proses">0</span><span class="lbl">Proses</span></div>
    <div class="stat-chip"><span class="cnt" id="cnt-bersih">0</span><span class="lbl">Bersih</span></div>
    <div class="stat-chip"><span class="cnt" id="cnt-temuan">0</span><span class="lbl">Temuan</span></div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="list-panel" class="pane active">
    <div id="list-controls">
      <div class="search-wrap">
        <span class="ico">🔍</span>
        <input id="search" placeholder="Cari nama atau IDPEL..." oninput="renderList()"/>
      </div>
    </div>
    <div id="list-body"></div>
  </div>
  <div id="map" class="pane"></div>
</div>

<!-- BOTTOM NAV (mobile) -->
<div id="bottom-nav" style="display:none">
  <button class="nav-btn active" id="nav-list" onclick="switchPane('list')">
    <span class="nav-ico">📋</span>LIST TO
  </button>
  <button class="nav-btn" id="nav-map" onclick="switchPane('map')">
    <span class="nav-ico">🗺️</span>MAPS
  </button>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-icon">⚡</div>
      <div class="modal-title">
        <h2 id="m-nama"></h2>
        <div class="idpel" id="m-idpel"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="info-grid">
        <div class="info-box"><label>Tarif/Daya</label><span id="m-tarif"></span></div>
        <div class="info-box"><label>RBM</label><span id="m-rbm"></span></div>
        <div class="info-box"><label>Skor</label><span id="m-skor"></span></div>
        <div class="info-box"><label>Avg 12bln</label><span id="m-avg"></span></div>
        <div class="info-box"><label>Avg Prior</label><span id="m-avgp"></span></div>
        <div class="info-box"><label>Drop %</label><span id="m-drop"></span></div>
      </div>
      <div class="alasan-box" id="m-alasan"></div>
      <div class="section-lbl">Pemakaian 12 Bulan</div>
      <div id="usage-chart"></div>
      <div class="section-lbl">Status Kunjungan</div>
      <div class="status-grid">
        <button class="s-btn" data-s="belum" onclick="setStatus('belum')">⬜ Belum</button>
        <button class="s-btn" data-s="proses" onclick="setStatus('proses')">🟡 Proses</button>
        <button class="s-btn" data-s="bersih" onclick="setStatus('bersih')">🟢 Bersih</button>
        <button class="s-btn" data-s="temuan" onclick="setStatus('temuan')">🔴 Ada Temuan</button>
      </div>
      <div class="catatan-wrap">
        <textarea id="m-catatan" placeholder="Catatan kunjungan..."></textarea>
      </div>
      <div class="photo-row">
        <a id="m-p1" class="photo-btn" target="_blank">📷 Foto 1</a>
        <a id="m-p2" class="photo-btn" target="_blank">📷 Foto 2</a>
        <a id="m-gmaps" class="photo-btn gmaps-btn" target="_blank">🧭 Navigasi</a>
      </div>
      <button class="save-btn" id="btn-save" onclick="saveStatus()">💾 Simpan Status</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

const CUSTOMERS = DATA.data;
const MONTHS = DATA.months;

let userName='', scriptUrl='', statuses={}, activeId=null, mapInitialized=false;
let map, markers={}, cluster;

const S={
  belum:{label:'Belum',color:'#3B82F6',dot:'#3B82F6'},
  proses:{label:'Proses',color:'#F59E0B',dot:'#F59E0B'},
  bersih:{label:'Bersih',color:'#22C55E',dot:'#22C55E'},
  temuan:{label:'Ada Temuan',color:'#EF4444',dot:'#EF4444'}
};

function skorClass(s){return s>=60?'skor-high':s>=30?'skor-mid':'skor-low'}

function startApp(){
  const n=document.getElementById('inp-nama').value.trim();
  if(!n){alert('Nama petugas wajib diisi');return}
  userName=n; scriptUrl=document.getElementById('inp-url').value.trim();
  document.getElementById('setup').style.display='none';
  document.getElementById('header').style.display='block';
  document.getElementById('main').style.display='flex';
  document.getElementById('bottom-nav').style.display='flex';
  document.getElementById('user-name').textContent=userName;
  if(window.innerWidth>=700){initMap();mapInitialized=true;}
  renderList(); updateStats();
  if(scriptUrl) syncStatus();
}

function switchPane(p){
  document.querySelectorAll('.pane').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  if(p==='list'){
    document.getElementById('list-panel').classList.add('active');
    document.getElementById('nav-list').classList.add('active');
  } else {
    const mapEl=document.getElementById('map');
    mapEl.classList.add('active');
    document.getElementById('nav-map').classList.add('active');
    // set explicit height so Leaflet sees non-zero container
    const mainH=document.getElementById('main').offsetHeight;
    mapEl.style.height=mainH+'px';
    if(!mapInitialized){
      initMap(); mapInitialized=true;
    } else {
      setTimeout(()=>map.invalidateSize(),50);
    }
  }
}

function initMap(){
  map=L.map('map').setView([-1.35,116.62],10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM',maxZoom:19}).addTo(map);
  cluster=L.markerClusterGroup({maxClusterRadius:50});
  CUSTOMERS.forEach(c=>{
    if(!c.lat||!c.lon)return;
    const m=L.circleMarker([c.lat,c.lon],{
      radius:9,fillColor:S[statuses[c.id]?.s||'belum'].color,
      color:'#fff',weight:2,opacity:1,fillOpacity:.9
    });
    m.bindTooltip(`<b>${c.nama}</b><br>${c.id}<br>Skor: ${c.skor}`,{direction:'top'});
    m.on('click',()=>openModal(c.id));
    markers[c.id]=m; cluster.addLayer(m);
  });
  map.addLayer(cluster);
}

function updateMarker(id){
  const m=markers[id]; if(!m)return;
  m.setStyle({fillColor:S[statuses[id]?.s||'belum'].color});
}

function renderList(){
  const q=document.getElementById('search').value.toLowerCase();
  const list=CUSTOMERS.filter(c=>!q||c.nama.toLowerCase().includes(q)||c.id.includes(q));
  document.getElementById('list-body').innerHTML=list.map(c=>{
    const st=statuses[c.id]?.s||'belum';
    return `<div class="cust-card${activeId===c.id?' active':''}" onclick="openModal('${c.id}')">
      <div class="card-top">
        <div class="card-nama">${c.nama}</div>
        <span class="skor-pill ${skorClass(c.skor)}">${c.skor}</span>
      </div>
      <div class="card-meta">${c.id} · ${c.rbm} · ${c.tarif}/${Number(c.daya).toLocaleString('id')}VA</div>
      <div class="card-status">
        <div class="status-dot" style="background:${S[st].dot}"></div>
        <span class="status-lbl" style="color:${S[st].dot}">${S[st].label}</span>
        ${!c.lat?'<span class="no-coord-tag">📍 no coord</span>':''}
      </div>
    </div>`;
  }).join('')||'<div style="padding:30px;text-align:center;color:var(--sub);font-size:.85rem">Tidak ada data</div>';
}

function updateStats(){
  const cnt={belum:0,proses:0,bersih:0,temuan:0};
  CUSTOMERS.forEach(c=>{cnt[statuses[c.id]?.s||'belum']++;});
  ['belum','proses','bersih','temuan'].forEach(k=>document.getElementById('cnt-'+k).textContent=cnt[k]);
}

function openModal(id){
  const c=CUSTOMERS.find(x=>x.id===id); if(!c)return;
  activeId=id;
  document.getElementById('m-nama').textContent=c.nama;
  document.getElementById('m-idpel').textContent=c.id+(c.lat?` · 📍${c.lat.toFixed(4)},${c.lon.toFixed(4)}`:' · 📍 Koordinat N/A');
  document.getElementById('m-tarif').textContent=c.tarif+'/'+Number(c.daya).toLocaleString('id')+'VA';
  document.getElementById('m-rbm').textContent=c.rbm;
  document.getElementById('m-avg').textContent=c.avg+' kWh';
  document.getElementById('m-avgp').textContent=c.avgp+' kWh';
  document.getElementById('m-drop').textContent=c.drop;
  const sc=document.getElementById('m-skor');
  sc.innerHTML=`<span class="skor-pill ${skorClass(c.skor)}">${c.skor}</span>`;
  document.getElementById('m-alasan').textContent=c.alasan||'-';
  // Chart
  const mx=Math.max(...c.usage,1);
  document.getElementById('usage-chart').innerHTML=
    `<div class="chart-bars">${c.usage.map((v,i)=>`<div class="chart-bar" style="height:${Math.round(v/mx*100)}%" title="${MONTHS[i]}: ${v} kWh"></div>`).join('')}</div>
     <div class="chart-xlabels">${MONTHS.map(m=>`<div class="chart-xl">${m.replace('-','<br>')}</div>`).join('')}</div>`;
  // Status
  const st=statuses[id]?.s||'belum';
  document.querySelectorAll('.s-btn').forEach(b=>{
    b.className='s-btn'+(b.dataset.s===st?` act-${b.dataset.s}`:'');
  });
  document.getElementById('m-catatan').value=statuses[id]?.catatan||'';
  // Photos
  ['p1','p2'].forEach(k=>{
    const el=document.getElementById('m-'+k);
    el.href=c[k]||'#'; el.classList.toggle('disabled',!c[k]);
  });
  // Google Maps nav
  const gmaps=document.getElementById('m-gmaps');
  if(c.lat&&c.lon){
    gmaps.href=`https://www.google.com/maps/dir/?api=1&destination=${c.lat},${c.lon}&travelmode=driving`;
    gmaps.classList.remove('disabled');
  } else {
    gmaps.href='#'; gmaps.classList.add('disabled');
  }
  document.getElementById('modal-overlay').classList.add('open');
  if(c.lat&&markers[id]){
    map.setView([c.lat,c.lon],15,{animate:true});
    cluster.zoomToShowLayer(markers[id],()=>markers[id].openTooltip());
  }
  renderList();
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  activeId=null; renderList();
}

function setStatus(s){
  if(!activeId)return;
  if(!statuses[activeId])statuses[activeId]={};
  statuses[activeId].s=s;
  document.querySelectorAll('.s-btn').forEach(b=>{
    b.className='s-btn'+(b.dataset.s===s?` act-${b.dataset.s}`:'');
  });
  updateMarker(activeId); updateStats();
}

async function saveStatus(){
  if(!activeId)return;
  const catatan=document.getElementById('m-catatan').value.trim();
  const st=statuses[activeId]?.s||'belum';
  if(!statuses[activeId])statuses[activeId]={};
  Object.assign(statuses[activeId],{catatan,by:userName,ts:new Date().toISOString()});
  renderList(); updateStats();
  if(scriptUrl){
    const btn=document.getElementById('btn-save');
    btn.disabled=true; btn.textContent='Menyimpan...';
    try{
      await fetch(scriptUrl,{method:'POST',body:JSON.stringify({action:'updateStatus',idpel:activeId,status:st,catatan,nama:userName})});
      showToast('✅ Status tersimpan');
    }catch{showToast('⚠️ Gagal sync, disimpan lokal',true)}
    btn.disabled=false; btn.textContent='💾 Simpan Status';
  } else showToast('✅ Disimpan (lokal)');
}

async function syncStatus(){
  if(!scriptUrl)return;
  try{
    const r=await fetch(scriptUrl+'?action=getStatus');
    const d=await r.json();
    if(d.statuses){
      d.statuses.forEach(row=>{
        if(row.idpel)statuses[row.idpel]={s:row.status||'belum',catatan:row.catatan||'',by:row.nama||''};
      });
      CUSTOMERS.forEach(c=>updateMarker(c.id));
      renderList(); updateStats(); showToast('↻ Sinkronisasi berhasil');
    }
  }catch{showToast('⚠️ Gagal sinkronisasi',true)}
}

function showToast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(err?' err':'')+' show';
  setTimeout(()=>t.className='toast'+(err?' err':''),2500);
}

document.getElementById('modal-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal-overlay'))closeModal();
});
window.addEventListener('resize',()=>{
  const mapEl=document.getElementById('map');
  if(mapEl.classList.contains('active')&&mapInitialized){
    mapEl.style.height=document.getElementById('main').offsetHeight+'px';
    map&&map.invalidateSize();
  }
});
</script>
</body>
</html>
